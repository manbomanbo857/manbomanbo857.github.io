<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沒錢啦！！！</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: none;
            /* 二次元高級冷色漸變：夜空藍、冰藍、霧紫、淺青、銀灰、琉璃藍 */
            background: linear-gradient(-45deg, #0f172a, #38bdf8, #8b5cf6, #22d3ee, #e2e8f0, #1d4ed8);
            background-size: 500% 500%;
            /* 加快流動速度 → 改成3秒，動感更強 */
            animation: gradientShift 3s ease infinite;
            min-height: 100vh;
        }

        /* 背景漸變動畫 */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景圖片容器 */
        .bg-container {
            position: relative;
            width: 100vw;
            overflow: auto;
            will-change: transform;
            background-color: transparent;
        }

        .bg-image {
            display: block;
            width: 100%;
            filter: brightness(1.2) contrast(1.1);
            loading: eager;
            image-rendering: crisp-edges;
            animation: fadeIn 0.3s ease-in;
            /* 冷色背景融合更自然 */
            mix-blend-mode: screen;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 中間文字與二維碼層（新增） */
        .content-layer {
            position: relative;
            width: 100vw;
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1rem;
            padding: 2rem 1rem;
            pointer-events: none;
            z-index: 999;
        }

        /* 輕微振動文字 */
        .soft-shake-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #22d3ee;
            text-shadow: 2px 2px 0 #000;
            animation: softShake 0.3s infinite alternate;
        }

        @keyframes softShake {
            0% { transform: translate(-2px, -2px) rotate(-1deg); }
            100% { transform: translate(2px, 2px) rotate(1deg); }
        }

        /* 二維碼樣式 */
        .qr-code {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.4);
            pointer-events: auto;
            mix-blend-mode: normal;
        }

        /* 劇烈抖動文字 */
        .shake-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff6b6b;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            animation: bigShake 0.15s infinite alternate;
        }

        @keyframes bigShake {
            0% { transform: translate(-8px, -8px) rotate(-3deg); }
            25% { transform: translate(8px, 8px) rotate(3deg); }
            50% { transform: translate(-8px, 8px) rotate(-3deg); }
            75% { transform: translate(8px, -8px) rotate(3deg); }
            100% { transform: translate(-8px, -8px) rotate(-3deg); }
        }

        /* 喵斯文字 */
        .muse-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd460;
            text-shadow: 2px 2px 0 #000;
        }

        /* 音樂控制按鈕 */
        .music-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 10000;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }

        /* 手機適配 */
        @media (max-width: 600px) {
            .soft-shake-text { font-size: 1.2rem; }
            .shake-text { font-size: 1.8rem; }
            .muse-text { font-size: 1.3rem; }
            .qr-code { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>
    <!-- 背景圖片容器 -->
    <div class="bg-container">
        <img src="Image_1777219587636_682 (3).webp" alt="背景畫作" class="bg-image">
    </div>

    <!-- 中間文字與二維碼區域（新增） -->
    <div class="content-layer">
        <div class="soft-shake-text">～點擊屏幕播放音樂喵～</div>
        
        <img src="mm_facetoface_collect_qrcode_1777306294962_edit_4222158339459.png" alt="贊助二維碼" class="qr-code">
        
        <div class="shake-text">啊啊啊啊啊啊！沒錢啦！？～</div>
        <div class="muse-text">都給我去玩喵斯～順便V我50！</div>
    </div>

    <!-- 背景音樂（自動播放+循環） -->
    <audio id="bgMusic" src="evening.mp3" loop preload="auto">
    <!-- 音樂控制按鈕 -->
    <button class="music-btn" id="musicToggle">🔊</button>

    <script>
        // 拖動滾動邏輯
        const container = document.querySelector('.bg-container');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - container.offsetLeft;
            startY = e.pageY - container.offsetTop;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        });

        container.addEventListener('mouseleave', () => isDragging = false);
        container.addEventListener('mouseup', () => isDragging = false);

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const y = e.pageY - container.offsetTop;
            const walkX = (x - startX) * 1.5;
            const walkY = (y - startY) * 1.5;
            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        });

        // 觸控滾動邏輯
        container.addEventListener('touchstart', (e) => {
            startX = e.touches[0].pageX;
            startY = e.touches[0].pageY;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        });

        container.addEventListener('touchmove', (e) => {
            const x = e.touches[0].pageX;
            const y = e.touches[0].pageY;
            const walkX = (x - startX) * 1.5;
            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        });

        // 背景音樂控制邏輯
        const bgMusic = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        let isPlaying = false;

        // 頁面首次互動後自動播放（解決瀏覽器限制）
        document.addEventListener('click', () => {
            if (!isPlaying) {
                bgMusic.play().then(() => {
                    isPlaying = true;
                    musicToggle.textContent = '🔊';
                }).catch(err => {
                    console.log('自動播放被攔截，用戶需手動點擊按鈕播放');
                });
            }
        }, { once: true });

        // 手動控制播放/暫停
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) {
                bgMusic.pause();
                musicToggle.textContent = '🔇';
            } else {
                bgMusic.play();
                musicToggle.textContent = '🔊';
            }
            isPlaying = !isPlaying;
        });

        // 預設音量 50%，避免太吵
        bgMusic.volume = 0.5;
    </script>
</body>
</html>
