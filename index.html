<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿巴阿巴</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('bg.png') center center / cover no-repeat;
            font-family: sans-serif;
            color: white;
            text-align: center;
            position: relative;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }
        .content {
            position: relative;
            z-index: 1;
            padding-top: 100px;
        }
        .shake-title {
            font-size: 3em;
            animation: shake 0.1s infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-3px) rotate(-1deg); }
            50% { transform: translateX(3px) rotate(1deg); }
            75% { transform: translateX(-3px) rotate(-1deg); }
            100% { transform: translateX(3px) rotate(1deg); }
        }
        .text {
            font-size: 1.5em;
            margin: 20px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .vme50 {
            font-size: 2em;
            color: #ff4444;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <h1 class="shake-title">阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴</h1>
        <p class="text">阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴</p>
        <p class="text">阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴</p>
        <p class="text">阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴阿巴</p>
        <p class="vme50">沒錢了，V我50！</p>
    </div>
</body>
</html>
