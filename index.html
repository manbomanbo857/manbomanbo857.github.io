<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沒錢啦！！！</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: none;
            /* 增加超多漸變色彩：紅、白、藍、紫、粉、淺青、橙 */
            background: linear-gradient(-45deg, #ff4444, #ffffff, #4488ff, #a855f7, #ff77bb, #44ddcc, #ffaa33);
            background-size: 500% 500%;
            /* 加快漸變速度 原本12s 改成5s，流動感更強 */
            animation: gradientShift 5s ease infinite;
            min-height: 100vh;
        }

        /* 背景漸變動畫 */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景圖片容器 */
        .bg-container {
            position: relative;
            width: 100vw;
            overflow: auto;
            will-change: transform;
            background-color: transparent;
        }

        .bg-image {
            display: block;
            width: 100%;
            filter: brightness(1.3) contrast(1.1);
            loading: eager;
            image-rendering: crisp-edges;
            animation: fadeIn 0.3s ease-in;
            mix-blend-mode: multiply;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 固定文字與二維碼層 */
        .bottom-layer {
            position: fixed;
            bottom: 5vh;
            left: 0;
            width: 100vw;
            pointer-events: none;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 1rem;
            padding: 0 1rem;
        }

        /* 二維碼樣式 */
        .qr-code {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            pointer-events: auto;
            mix-blend-mode: normal;
        }

        /* 第一行抖動文字 */
        .shake-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            animation: bigShake 0.15s infinite alternate;
        }

        @keyframes bigShake {
            0% { transform: translate(-8px, -8px) rotate(-3deg); }
            25% { transform: translate(8px, 8px) rotate(3deg); }
            50% { transform: translate(-8px, 8px) rotate(-3deg); }
            75% { transform: translate(8px, -8px) rotate(3deg); }
            100% { transform: translate(-8px, -8px) rotate(-3deg); }
        }

        /* 第二行文字 */
        .muse-text {
            font-size: 2rem;
            font-weight: bold;
            color: #ff9900;
            text-shadow: 2px 2px 0 #000;
        }

        /* 第三行文字 */
        .vme-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #33ccff;
            text-shadow: 2px 2px 0 #000;
        }

        /* 手機適配 */
        @media (max-width: 600px) {
            .shake-text { font-size: 1.8rem; }
            .muse-text { font-size: 1.5rem; }
            .vme-text { font-size: 1.3rem; }
            .qr-code { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>
    <!-- 背景圖片容器 -->
    <div class="bg-container">
        <img src="Image_1777219587636_682 (3).webp" alt="背景畫作" class="bg-image">
    </div>

    <!-- 底部固定文字與二維碼層 -->
    <div class="bottom-layer">
        <img src="mm_facetoface_collect_qrcode_1777306294962_edit_4222158339459.png" alt="贊助二維碼" class="qr-code">
        
        <div class="shake-text">啊啊啊啊啊啊沒錢啦！</div>
        <div class="muse-text">都給我去玩喵斯！</div>
        <div class="vme-text">順便V我50～</div>
    </div>

    <script>
        // 拖動滾動邏輯
        const container = document.querySelector('.bg-container');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - container.offsetLeft;
            startY = e.pageY - container.offsetTop;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        });

        container.addEventListener('mouseleave', () => isDragging = false);
        container.addEventListener('mouseup', () => isDragging = false);

        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - container.offsetLeft;
            const y = e.pageY - container.offsetTop;
            const walkX = (x - startX) * 1.5;
            const walkY = (y - startY) * 1.5;
            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        });

        // 觸控滾動邏輯
        container.addEventListener('touchstart', (e) => {
            startX = e.touches[0].pageX;
            startY = e.touches[0].pageY;
            scrollLeft = container.scrollLeft;
            scrollTop = container.scrollTop;
        });

        container.addEventListener('touchmove', (e) => {
            const x = e.touches[0].pageX;
            const y = e.touches[0].pageY;
            const walkX = (x - startX) * 1.5;
            container.scrollLeft = scrollLeft - walkX;
            container.scrollTop = scrollTop - walkY;
        });
    </script>
</body>
</html>
