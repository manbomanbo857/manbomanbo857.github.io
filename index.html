<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沒錢啦！！！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, #fef6e7, #fadadd, #d4edda, #cce7f5);
            background-size: 400% 400%;
            animation: gradientShift 4s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 1. 背景插圖：只放在頂部，不會覆蓋整個頁面 */
        .artwork {
            width: 100%;
            display: block;
            margin: 0 auto;
            /* 關鍵：用 opacity 控制，避免完全不透明 */
            opacity: 0.9;
        }

        /* 2. 底部固定區域：絕對置頂，永遠在最前面 */
        .bottom-ui {
            position: fixed;
            bottom: 5vh;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 99999; /* 極高層級，壓過所有東西 */
            pointer-events: none; /* 不影響點擊播放音樂 */
        }

        .qr-code {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            pointer-events: auto; /* 唯獨二維碼可點擊 */
        }

        /* 提示文字 */
        .hint {
            font-family: "Comic Sans MS", sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            background: linear-gradient(90deg, #ff7eb3, #74b9ff, #ffe082);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            color: transparent;
            animation: textColor 3s ease infinite, bounce 2.5s ease-in-out infinite;
        }

        @keyframes textColor {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* 文字特效 */
        .text1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 3px 3px 0 #000;
            animation: shake 0.15s infinite alternate;
        }

        @keyframes shake {
            0% { transform: translate(-6px, -6px) rotate(-2deg); }
            100% { transform: translate(6px, 6px) rotate(2deg); }
        }

        .text2 {
            font-size: 2rem;
            color: #ff9900;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        .text3 {
            font-size: 1.8rem;
            color: #33ccff;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }

        /* 手機適配 */
        @media (max-width: 600px) {
            .text1 { font-size: 1.8rem; }
            .text2 { font-size: 1.5rem; }
            .text3 { font-size: 1.3rem; }
            .hint { font-size: 1.1rem; }
            .qr-code { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <!-- 1. 頂部插圖 -->
    <img src="Image_1777219587636_682 (3).webp" class="artwork">

    <!-- 2. 背景音樂 -->
    <audio id="bgm" loop preload="auto">
        <source src="https://raw.githubusercontent.com/manbomanbo857/manbomanbo857.github.io/main/evening.mp3" type="audio/mpeg">
    

    <!-- 3. 底部文字+二維碼（永遠在最前面） -->
    <div class="bottom-ui">
        <img src="mm_facetoface_collect_qrcode_1777306294962_edit_4222158339459.png" class="qr-code">
        <div class="hint">～點擊屏幕聽歌～</div>
        <div class="text1">啊啊啊啊啊啊沒錢啦！</div>
        <div class="text2">都給我去玩喵斯！</div>
        <div class="text3">順便V我50～</div>
    </div>

    <script>
        // 點擊播放音樂
        const music = document.getElementById('bgm');
        document.addEventListener('click', () => {
            music.play();
        }, { once: true });
    </script>

</body>
</html>
